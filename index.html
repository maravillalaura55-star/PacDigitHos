<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal del Paciente DigitHos</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>
  <h1>🏥 Portal del Paciente DigitHos</h1>
</header>

<!-- LOGIN -->
<section class="login">
  <select id="pacienteSelect"></select>
  <button onclick="login()">Entrar</button>
</section>

<!-- PANEL PRINCIPAL -->
<section id="panel" class="hidden">

  <div class="perfil">
    <h2 id="nombrePaciente"></h2>
    <p id="infoPaciente"></p>
  </div>

  <div class="alertas">
    <h3>📌 Medicamentos</h3>
    <div id="medicamentos"></div>
  </div>

  <div class="mediciones">
    <h3>📊 Registro de Salud</h3>

    <label>Glucosa:</label>
    <input type="number" id="glucosa">

    <label>Presión arterial:</label>
    <input type="text" id="presion">

    <button onclick="guardarMedicion()">Guardar</button>

    <div id="historial"></div>
  </div>

  <div class="educacion">
    <h3>🎓 Módulo educativo</h3>
    <iframe 
    src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2FPAHOWHO%2Fvideos%2F664520729885166%2F&show_text=false&width=476&t=0"
    width="100%" 
    height="400"
    style="border:none;overflow:hidden;border-radius:10px;"
    scrolling="no"
    frameborder="0"
    allowfullscreen="true"
    allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
  </iframe>
  </div>

</section>

<script src="pacientes.js"></script>
<script src="script.js"></script>

</body>
</html>
